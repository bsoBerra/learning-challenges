<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Годинник</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="clock-panel">
        <div class="clock" id="clock" aria-label="Інтерактивний циферблат">
          <div class="minute-marks" id="minuteMarks" aria-hidden="true"></div>
          <div class="tick tick-12">12</div>
          <div class="tick tick-1">1</div>
          <div class="tick tick-2">2</div>
          <div class="tick tick-3">3</div>
          <div class="tick tick-4">4</div>
          <div class="tick tick-5">5</div>
          <div class="tick tick-6">6</div>
          <div class="tick tick-7">7</div>
          <div class="tick tick-8">8</div>
          <div class="tick tick-9">9</div>
          <div class="tick tick-10">10</div>
          <div class="tick tick-11">11</div>

          <button class="hand hour-hand" id="hourHand" type="button" aria-label="Годинна стрілка"></button>
          <button class="hand minute-hand" id="minuteHand" type="button" aria-label="Хвилинна стрілка"></button>
          <div class="center-dot" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="controls" aria-labelledby="app-title">
        <h1 id="app-title">Годинник</h1>
        <p class="hint">Натисніть кнопку, щоб згенерувати випадковий час.</p>
        <div class="score" aria-live="polite">
          <span class="score-label">Генерацій</span>
          <span class="score-value" id="generationCountValue">1</span>
          <span class="score-label">Рахунок</span>
          <span class="score-value" id="scoreValue">0</span>
        </div>
        <button class="show-button" id="randomTimeButton" type="button">Випадковий час</button>
        <div class="answer-time" aria-label="Поле для вказання часу">
          <div class="answer-digit-control">
            <button class="digit-button" type="button" data-answer-step="hourTens" data-direction="1" aria-label="Збільшити десятки годин">▲</button>
            <span class="answer-digit" data-answer-digit="hourTens">0</span>
            <button class="digit-button" type="button" data-answer-step="hourTens" data-direction="-1" aria-label="Зменшити десятки годин">▼</button>
          </div>
          <div class="answer-digit-control">
            <button class="digit-button" type="button" data-answer-step="hourOnes" data-direction="1" aria-label="Збільшити одиниці годин">▲</button>
            <span class="answer-digit" data-answer-digit="hourOnes">0</span>
            <button class="digit-button" type="button" data-answer-step="hourOnes" data-direction="-1" aria-label="Зменшити одиниці годин">▼</button>
          </div>
          <span class="answer-separator">:</span>
          <div class="answer-digit-control">
            <button class="digit-button" type="button" data-answer-step="minuteTens" data-direction="1" aria-label="Збільшити десятки хвилин">▲</button>
            <span class="answer-digit" data-answer-digit="minuteTens">0</span>
            <button class="digit-button" type="button" data-answer-step="minuteTens" data-direction="-1" aria-label="Зменшити десятки хвилин">▼</button>
          </div>
          <div class="answer-digit-control">
            <button class="digit-button" type="button" data-answer-step="minuteOnes" data-direction="1" aria-label="Збільшити одиниці хвилин">▲</button>
            <span class="answer-digit" data-answer-digit="minuteOnes">0</span>
            <button class="digit-button" type="button" data-answer-step="minuteOnes" data-direction="-1" aria-label="Зменшити одиниці хвилин">▼</button>
          </div>
          <output class="answer-result hidden" id="answerResult" aria-live="polite"></output>
        </div>
        <button class="show-button" id="showTimeButton" type="button">Перевірити</button>
        <output class="digital-time hidden" id="digitalTime" aria-live="polite"></output>
      </aside>
    </main>

    <script src="index.js"></script>
  </body>
</html>
